<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create New Blog Post</title>
    <style>
        /* Base Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117; /* Midnight Blue Professional */
            color: #c9d1d9;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .wrapper {
            width: 100%;
            max-width: 900px;
        }

        /* Centered Header */
        h1 {
            text-align: center;
            font-weight: 300;
            font-size: 2.2rem;
            letter-spacing: 0.5px;
            color: #ffffff;
            margin-bottom: 40px;
        }

        /* The Professional Form Card */
        form {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        /* Specific Label Styling */
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #e6edf3;
            font-size: 0.95rem;
        }

        /* Form Controls (Inputs & Textarea) */
        input[type="text"], textarea {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 25px;
            border-radius: 6px;
            border: 1px solid #30363d;
            background-color: #0d1117;
            color: #c9d1d9;
            font-size: 1rem;
            font-family: inherit; /* Ensures textarea uses same font */
            box-sizing: border-box; /* Crucial for padding/width */
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        /* Input Interaction States */
        input[type="text"]:focus, textarea:focus {
            border-color: #58a6ff; /* Soft Action Blue */
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.2);
        }

        textarea {
            resize: vertical; /* Only allow vertical resizing */
            min-height: 200px;
        }

        /* Action Buttons Area */
        .btn-group {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }

        /* Shared Button Properties */
        .btn {
            padding: 10px 22px;
            border-radius: 6px;
            border: none;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none; /* For the cancel link */
        }

        /* Specific Button Colors per Screenshot */
        .btn-cancel {
            background-color: #30363d; /* Slate Gray */
            color: #c9d1d9;
        }

        .btn-cancel:hover {
            background-color: #444c56;
        }

        .btn-publish {
            background-color: #1a7f37; /* Clean, Safe Green */
            color: white;
        }

        .btn-publish:hover {
            background-color: #218e44;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>Create New Blog Post</h1>

    <form th:action="@{/save}" method="POST">

        <label for="title">Title</label>
        <input type="text" id="title" name="title" placeholder="Enter post title" required>

        <label for="author">Author</label>
        <input type="text" id="author" name="author" placeholder="Enter author name" required>

        <label for="content">Content</label>
        <textarea id="content" name="content" placeholder="Write your post content here..."></textarea>

        <div class="btn-group">
            <a href="/dashboard" class="btn btn-cancel">Cancel</a>
            <button type="submit" class="btn btn-publish">Publish Post</button>
        </div>
    </form>
</div>

</body>
</html>
