<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Blog Post</title>
    <style>
        /* Reusing your preferred Midnight Blue & Charcoal Palette */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .wrapper {
            width: 100%;
            max-width: 900px;
        }

        h1 {
            text-align: center;
            font-weight: 300;
            font-size: 2.2rem;
            color: #ffffff;
            margin-bottom: 40px;
        }

        form {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #e6edf3;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 25px;
            border-radius: 6px;
            border: 1px solid #30363d;
            background-color: #0d1117;
            color: #ffffff; /* Bright white for actual data text */
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.2);
        }

        textarea {
            min-height: 200px;
            resize: vertical;
        }

        .btn-group {
            display: flex;
            justify-content: space-between;
        }

        .btn {
            padding: 10px 22px;
            border-radius: 6px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .btn-back { background-color: #484f58; color: #ffffff; }
        .btn-update { background-color: #1f6feb; color: white; }
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>Edit Blog Post</h1>

    <form th:action="@{/update}" th:object="${post}" method="POST">

        <input type="hidden" th:field="*{id}" />

        <label for="title">Title</label>
        <input type="text" id="title" th:field="*{title}" />

        <label for="author">Author</label>
        <input type="text" id="author" th:field="*{author}" />

        <label for="content">Content</label>
        <textarea id="content" th:field="*{content}"></textarea>

        <div class="btn-group">
            <a th:href="@{/}" class="btn btn-back">Back</a>
            <button type="submit" class="btn btn-update">Update Post</button>
        </div>
    </form>
</div>

</body>
</html>
